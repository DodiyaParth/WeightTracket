name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Typecheck, unit tests + coverage, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: application/package-lock.json
      - name: Install dependencies
        run: npm --prefix application ci
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build

  e2e:
    name: Playwright e2e (offline harness)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: application
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: application/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit
      - name: Run functional e2e specs
        # Excludes the pixel-diff visual baselines: those snapshots were
        # generated on macOS (see e2e/visual.spec.ts's own comment) and would
        # need a Linux-generated set to run here too. Every *functional*
        # layout/overflow assertion this plan's phases actually rely on still
        # runs on all three projects (desktop, mobile, mobile-safari).
        run: npx playwright test --grep-invert "visual baselines"
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: application/playwright-report/
          retention-days: 14
